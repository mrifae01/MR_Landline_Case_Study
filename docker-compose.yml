services:
  db:
    image: postgres:16-alpine
    container_name: landline_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: landline
      POSTGRES_PASSWORD: landline_password
      POSTGRES_DB: landline_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


volumes:
  postgres_data:
